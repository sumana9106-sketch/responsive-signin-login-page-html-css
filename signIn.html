<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a secure entryway where users input their credentials to access a website or application">
    <title>SignIn Page</title> 
    <link rel="stylesheet" href="signIn.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="outer">
        <div class="sign-in">
            <h1>Welcome</h1>
            <h2>Create account</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button type="submit-2">Sign In</button>
            <p>Already have any account ?
                <a href="index.html" class="switch">Log In</a>
            </p>
            <div class="divider">Or register with</div>
            <div class="logos">
                <div id="google"><a href="#"><i class="fa-brands fa-google"></i></a></div>
                <div id="twitter"><a href="#"><i class="fa-brands fa-x-twitter"></i></a></div>
                <div id="facebook"><a href="#"><i class="fa-brands fa-facebook-f"></i></a></div>

            </div>
        </div>
        
    </div>
</body>
</html>
