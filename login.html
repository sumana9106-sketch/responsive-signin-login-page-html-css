<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a digital entry point of a website, application or platform">
    <title>LogIn Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="outer">
        <div class="log-in">
            <h1>Welcome Back</h1>
            <input type="email" id="email" placeholder="Email or Username">
            <input type="password" id="password" placeholder="Password">
            <div class="rem">
                <label for="box" id="remember">
                    <input type="checkbox" id="box">Remember me
                </label>
                <a href="#">Forget password?</a>
            </div>
            <button type="submit" id="login">Log In</button>
            <p>Don't have any account ?
                <a href="signIn.html" class="switch">Sign Up</a>
            </p>
        </div>

    </div>
</body>
</html>
